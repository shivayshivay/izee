<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Izee Got Talent + DJ Night — Official Entry Pass</title>
    <meta name="description" content="Register, get your secure QR pass, and join Izee Got Talent + DJ Night." />
    <meta name="theme-color" content="#050311" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #050311; }
      /* Fix html5-qrcode dark mode */
      #qr-reader { border: none !important; }
      #qr-reader video { border-radius: 12px; }
      #qr-reader__scan_region { background: transparent !important; }
      #qr-reader__dashboard { background: rgba(18,9,31,0.9) !important; color: #fff !important; padding: 8px !important; }
      #qr-reader__dashboard button { background: linear-gradient(135deg,#7c3aed,#06b6d4) !important; border: none !important; color: #fff !important; border-radius: 8px !important; padding: 8px 16px !important; cursor: pointer !important; font-family: 'Space Grotesk', sans-serif !important; font-weight: 700 !important; }
      #qr-reader__dashboard select { background: rgba(15,8,32,0.9) !important; color: #fff !important; border: 1px solid rgba(124,58,237,0.4) !important; border-radius: 8px !important; padding: 6px !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
